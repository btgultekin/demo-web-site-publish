<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bakım Modu</title>
    <style>
        body { font-family: system-ui, sans-serif; display: grid; place-items: center; min-height: 100vh; margin: 0; background: #faf7f4; color: #3d3d3d; }
        .card { max-width: 32rem; padding: 2rem; text-align: center; }
        h1 { font-size: 1.75rem; margin-bottom: 0.75rem; }
        p { line-height: 1.6; color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Site Bakımda</h1>
        <p>Şu anda kısa bir bakım çalışması yapıyoruz. Lütfen daha sonra tekrar ziyaret edin.</p>
    </div>
</body>
</html>
